# ─── EEG 压力/情绪识别 训练配置 ───────────────────────────────────────────────
# 每个参数都标注了对训练效果的影响

# ─── 任务设置 ──────────────────────────────────────────────────────────────────
task_type: "classification"        # "classification" | "regression"
                                   # 分类输出logits，回归输出[0,1]连续值

num_classes: 3                     # 输出类别数 (STEW:10→映射为3类, DEAP:2/3, SEED:3)
                                   # 影响: 分类任务决定输出层维度，过少欠拟合过多稀疏

# ─── 数据集 ──────────────────────────────────────────────────────────────────
dataset:
  name: "STEW"                     # STEW | DEAP | SEED
  data_dir: "../"                  # .mat 文件所在目录

preprocessing:                     # ← 新增：数据预处理参数
  window_sec: 2.5                  # 滑窗长度（秒）
                                   # 影响: 窗口越短样本越多但时间信息减少，过长则样本少
                                   # 论文[2]: 2s, 论文[3]: 3s DEAP / 4s SEED
  overlap: 0.0                     # 【不重叠】相邻滑窗无数据共享，消除数据泄露
                                   # 影响: 重叠越大样本越多但引入冗余，默认50%
  fs: 128                          # 采样频率 (Hz) (STEW:128, DEAP:128, SEED:200)
                                   # 影响: 决定了n_timepoints计算，用错会导致频率分析失准
  normalize: "zscore"              # 归一化方式: "zscore" | "minmax" | "none"
                                   # 影响: zscore使各通道量纲统一，加速收敛；minmax保留分布
                                   # zscore对异常值鲁棒，minmax易受极端值影响
  bandpass_low: 0.5                # 带通滤波低频截止 (Hz)，论文[3]: 0.5Hz
                                   # 影响: 滤除基线漂移等低频噪声
  bandpass_high: 45                # 带通滤波高频截止 (Hz)，论文[3]: 45Hz
                                   # 影响: 滤除肌电等高频噪声，过窄会丢失有用频段信息
  extract_de: false                # 是否提取差分熵特征（论文[2]核心方法）
                                   # 影响: 开启可提升情绪分类准确率，但增加计算开销
  de_freq_bands:                   # 差分熵频段划分
    - [4, 8]     # Theta   — 放松、冥想状态
    - [8, 14]    # Alpha   — 安静清醒状态
    - [14, 31]   # Beta    — 活跃思考、压力状态
    - [31, 45]   # Gamma   — 认知处理、情绪加工
                                   # 影响: 论文[2]证明四个频段DE特征可显著提升Valence/Arousal分类

# ─── 模型架构 ────────────────────────────────────────────────────────────────
model:
  n_channels: 14                   # EEG通道数 (STEW:14, DEAP:32, SEED:62)
                                   # 影响: 决定模型输入维度，与数据集强绑定
  n_timepoints: 320                # 时间点数 (自动根据 window_sec × fs 计算)
                                   # 影响: 决定了CNN感受野覆盖的时间范围
  cnn_channels: [32, 64, 128]      # 【优化】精简通道数：14通道输入不需要256通道
                                   # CNN各层输出通道数，列表长度=卷积层数
                                   # 影响: 通道越多特征提取能力越强但参数量平方增长
                                   # 过少欠拟合，过多过拟合且显存暴增
  cnn_kernel_sizes: [7, 5, 5]      # ← 新增：各CNN层的卷积核大小
                                   # 影响: 核越大捕捉长程模式但参数多，核小关注局部
                                   # 论文[2]: 第一层用大核(7)捕捉全局，后续小核(5)细化
  lstm_hidden: 64                  # 【优化】精简：128→64，减少过拟合
                                   # LSTM隐藏层大小
                                   # 影响: 越大时序建模能力越强，但<cnn_channels时成为瓶颈
                                   # 论文[2]: 128, 论文[3]: 128
  lstm_layers: 2                   # LSTM层数
                                   # 影响: 深层捕捉更复杂时序依赖，2层后收益递减且易过拟合
                                   # 论文[2]: 2层
  lstm_bidirectional: true         # ← 新增：是否双向LSTM
                                   # 影响: 双向可捕捉前后文信息，精度+2~3%但参数量翻倍
  lstm_dropout: 0.4                # 【优化】dropout 0.5→0.4（原0.5配合小模型导致欠拟合）
                                   # ← 新增：LSTM内部dropout（仅多层时生效）
                                   # 影响: 防止LSTM过拟合，>0.5可能导致欠拟合
  dropout_rate: 0.4                # 【优化】dropout 0.5→0.4（原0.5+小模型→欠拟合）
                                   # 全连接层Dropout比率
                                   # 影响: 论文[3]: 0.3~0.5，太高导致欠拟合太低容易过拟合
  attention_heads: 4               # ← 新增：多头自注意力头数
                                   # 影响: 多头捕捉不同子空间注意力模式，头数=hidden_size/head_dim
                                   # 过多头会导致每个头维度太小，表达能力不足
  activation: "gelu"               # 【优化】GELU更平滑，训练更稳定，适合深层网络
                                   # 激活函数 "relu" | "gelu" | "leaky_relu"
                                   # 影响: relu最简单，gelu更平滑训练更稳定(Transformer常用)
                                   # leaky_relu可缓解"dying relu"问题
  use_2d_mapping: false            # 是否使用电极-矩形映射（论文[2] Fig.3）
                                   # 影响: 开启可+2~3%准确率但仅适用于标准32/62通道布局

# ─── 训练超参数 ───────────────────────────────────────────────────────────────
training:
  epochs: 50                       # 最大训练轮数
                                   # 影响: 太少欠拟合，太多过拟合，配合early_stop使用
                                   # 论文[2]: 100, 论文[3]: 100
  batch_size: 64                   # 批次大小
                                   # 影响: 大batch梯度稳定但泛化性略差，小batch收敛波动大
                                   # 论文[2]: 128, 论文[3]: 32/64
  optimizer: "adamw"               # ← 新增：优化器 "adam" | "adamw" | "sgd"
                                   # 影响: adam/adamw自适应学习率收敛快
                                   # adamw相比adam正确实现权重衰减，泛化更好
                                   # sgd收敛慢但最终泛化可能更好(需配合momentum)
  learning_rate: 0.0005             # 【3分类】降低学习率: 0.001→0.0005，3分类收敛更快，高LR容易
                                   # 在最优解附近震荡，导致val loss反弹
                                   # 影响: 最关键的超参数！太大不收敛，太小收敛极慢
  weight_decay: 0.05               # 【3分类】增大权重衰减: 0.03→0.05，3分类模型更易过拟合
                                   # 需要更强正则化。同时配合dropout=0.4防止欠拟合
                                   # 影响: 越大正则化越强，>0.1可能欠拟合，<1e-4几乎无效
  gradient_clip: 1.0               # 梯度裁剪阈值
                                   # 影响: 防止梯度爆炸，>5裁剪过弱，<0.1可能影响正常训练
  lr_scheduler: "plateau"          # 【优化】改用ReduceLROnPlateau，根据val_loss自适应调整LR
                                   # 影响: cosine平滑衰减适合CVT；plateau自适应；
                                   # null=固定学习率，简单任务够用
  warmup_epochs: 10                # 【优化】增大warmup: 5→10，稳定早期训练，配合plateau调度器
                                   # 影响: 从0逐步上升到初始LR，稳定早期训练
                                   # 尤其配合cosine调度时效果显著
  label_smoothing: 0.05            # 【3分类】降低标签平滑: 0.2→0.05，3分类只有3个输出，0.2平滑会让
                                   # 正确类权重降到0.87，模糊类别边界导致欠拟合
                                   # 影响: 防止过自信预测，提升泛化性，0=不平滑
  class_weight: "balanced"         # ← 新增：类别权重策略: "balanced" | "none"
                                   # 影响: balanced根据样本数反比加权，缓解类别不平衡
                                   # STEW标签分布不均匀(0-3极少)，建议开启
  mixed_precision: false           # ← 新增：混合精度训练 (fp16)
                                   # 影响: 显存减半+速度+30~50%，但小幅精度损失
                                   # 需GPU支持CUDA >= 7.0
  seed: 42                         # ← 新增：全局随机种子
                                   # 影响: 固定种子确保实验结果可复现
                                   # 论文实验对比必须固定，否则结果无法归因

  # 早停
  patience: 20                     # 【3分类】降低早停耐心: 100→20，3分类约20轮开始过拟合
                                   # 影响: 太小过早停止欠拟合，太大浪费时间
                                   # 论文[3]: 10~15
  min_delta: 0.001                 # 【3分类】增大早停敏感度: 0.0001→0.001，避免微小波动导致无法早停

# ─── 数据增强 ────────────────────────────────────────────────────────────────
augmentation:
  noise_std: 0.05                  # 【优化】增强噪声: 0.01→0.05，EEG信号幅度大，0.01几乎无效
                                   # 影响: 提高对噪声鲁棒性，>0.1会破坏信号
  channel_dropout_prob: 0.1        # 【优化】通道dropout: 0.05→0.1，迫使模型学习跨通道鲁棒性
                                   # 影响: 迫使模型不依赖特定通道，>0.2导致性能下降
  time_mask_prob: 0.1              # 【优化】时间掩码概率: 0.05→0.1，增强时间域鲁棒性
                                   # 影响: SpecAugment风格，提高时间鲁棒性
  time_mask_size: 40               # 【优化】掩码长度: 20→40，320点中掩码20点影响太小
                                   # 影响: 过小无法起到增强作用，过大可能掩盖关键信息

# ─── 特征选择（论文[3] PCA+MI） ─────────────────────────────────────────────
feature_selection:                 # ← 新增：特征选择模块
  use_pca_mi: false                # 是否使用PCA+MI特征选择
                                   # 影响: 论文[3]证明可+2~3%准确率，降低过拟合
  pca_variance_retained: 0.95      # PCA保留方差比例
                                   # 影响: 太高保留噪声，太低损失信息，常用0.90~0.99
  mi_top_k: 128                    # 互信息选择Top-K特征
                                   # 影响: 太大效果下降，太小损失信息

# ─── 数据划分 ────────────────────────────────────────────────────────────────
split:
  train_ratio: 0.7                 # 训练集比例
                                   # 影响: 太小欠拟合，太大验证集不可靠
  val_ratio: 0.15                  # 验证集比例
                                   # 影响: 早停和调参依据，<0.1可能不稳定
  test_ratio: 0.15                 # 测试集比例
                                   # 影响: 最终评估，过小置信区间宽
  random_seed: 42                  # 划分随机种子
                                   # 影响: 论文[3]: 42，不同种子结果不同，对比实验必须固定

# ─── 可视化 ──────────────────────────────────────────────────────────────────
visdom:
  enabled: true                     # 是否启用Visdom实时监控
  server: "http://localhost"        # Visdom服务器地址
  port: 707                         # 端口号
  env: "eeg_stress"                 # Visdom环境名称
                                   # 影响: 开启后可实时查看loss/accuracy曲线
                                   # 启动: python -m visdom.server -port 707
paths:
  log_dir: "./stew_logs"           # TensorBoard日志与训练曲线保存目录
  model_save_dir: "./stew_models"  # 模型检查点目录（最佳模型+最近检查点）
